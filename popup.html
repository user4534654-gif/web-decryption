<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #1a1a1a; color: #fff; width: 320px; margin: 0; padding: 15px; }
        h3 { margin-top: 0; color: #007bff; text-align: center; }
        label { font-size: 13px; color: #aaa; margin-bottom: 5px; display: block; }
        input { width: 100%; box-sizing: border-box; padding: 8px; margin-bottom: 15px; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 4px; }
        button { width: 100%; padding: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
        .btn-play { background: #28a745; color: white; }
        .btn-play:hover { background: #218838; }
        .btn-stop { background: #dc3545; color: white; }
        .btn-stop:hover { background: #c82333; }
        .status { text-align: center; font-size: 12px; color: #ffc107; margin-top: 10px; }
    </style>
</head>
<body>
    <h3>🔓 Live Unscrambler</h3>
    
    <label>Decryption Key:</label>
    <input type="text" id="keyInput" placeholder="Paste key: 10x10|aB3f...">
    
    <button class="btn-play" id="startBtn">DECRYPT CURRENT VIDEO</button>
    <button class="btn-stop" id="stopBtn">STOP & RESTORE</button>

    <div class="status" id="statusMsg"></div>

    <script src="popup.js"></script>
</body>
</html>
